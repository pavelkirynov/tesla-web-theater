<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Theater</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--bg: #0a0a0c;
--surface: #111116;
--border: #222228;
--accent: #e8ff47;
--accent2: #ff4757;
--text: #f0f0f0;
--muted: #555560;
}

html, body {
width: 100%; height: 100%;
background: var(--bg);
color: var(--text);
font-family: 'DM Mono', monospace;
overflow: hidden;
-webkit-tap-highlight-color: transparent;
user-select: none;
}

/* ── SCREENS ── */
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity .35s ease; }
.screen.hidden { opacity: 0; pointer-events: none; }

/* ── HOME SCREEN ── */
#home {
align-items: center;
justify-content: center;
gap: 40px;
background: var(--bg);
}

.home-bg {
position: absolute; inset: 0;
background:
radial-gradient(ellipse 60% 40% at 20% 80%, rgba(232,255,71,.06) 0%, transparent 60%),
radial-gradient(ellipse 40% 60% at 80% 20%, rgba(255,71,87,.05) 0%, transparent 60%);
pointer-events: none;
}

.logo {
font-family: 'Syne', sans-serif;
font-size: clamp(28px, 6vw, 52px);
font-weight: 800;
letter-spacing: -.02em;
color: var(--text);
z-index: 1;
}
.logo span { color: var(--accent); }

.tagline {
font-size: 11px;
letter-spacing: .2em;
text-transform: uppercase;
color: var(--muted);
z-index: 1;
margin-top: -28px;
}

.input-wrap {
width: min(560px, 90vw);
z-index: 1;
display: flex;
flex-direction: column;
gap: 12px;
}

.input-label {
font-size: 10px;
letter-spacing: .18em;
text-transform: uppercase;
color: var(--muted);
}

.url-row {
display: flex;
gap: 10px;
align-items: stretch;
}

#urlInput {
flex: 1;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 10px;
padding: 14px 18px;
color: var(--text);
font-family: 'DM Mono', monospace;
font-size: 13px;
outline: none;
transition: border-color .2s;
}
#urlInput:focus { border-color: var(--accent); }
#urlInput::placeholder { color: var(--muted); }

.btn-play {
background: var(--accent);
color: #0a0a0c;
border: none;
border-radius: 10px;
padding: 0 22px;
font-family: 'Syne', sans-serif;
font-weight: 700;
font-size: 13px;
letter-spacing: .05em;
cursor: pointer;
white-space: nowrap;
transition: transform .12s, background .15s;
-webkit-tap-highlight-color: transparent;
}
.btn-play:active { transform: scale(.95); background: #d4eb30; }

.hint {
font-size: 11px;
color: var(--muted);
line-height: 1.6;
}
.hint b { color: var(--text); font-weight: 400; }

.history-wrap {
width: min(560px, 90vw);
z-index: 1;
}
.history-title {
font-size: 10px;
letter-spacing: .18em;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 10px;
}
.history-list {
display: flex;
flex-direction: column;
gap: 6px;
max-height: 120px;
overflow-y: auto;
}
.history-item {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 8px;
padding: 9px 14px;
font-size: 12px;
color: var(--text);
cursor: pointer;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
transition: border-color .15s, background .15s;
}
.history-item:active { background: #1a1a22; border-color: var(--accent); }

#errorMsg {
font-size: 12px;
color: var(--accent2);
min-height: 16px;
text-align: center;
z-index: 1;
}

/* ── PLAYER SCREEN ── */
#player {
background: #000;
}

/* Hidden real video — off-screen so Tesla doesn't detect it as “visible video” */
#hiddenVideo {
position: fixed;
left: -9999px;
top: -9999px;
width: 1px;
height: 1px;
opacity: 0;
pointer-events: none;
}

/* Canvas fills the whole screen */
#cvs {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
display: block;
background: #000;
touch-action: none;
}

/* Overlay controls — fade out after 3s of inactivity */
#controls {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
justify-content: flex-end;
background: linear-gradient(transparent 50%, rgba(0,0,0,.85) 100%);
transition: opacity .4s ease;
}
#controls.fade { opacity: 0; pointer-events: none; }

.ctrl-bar {
padding: 16px 24px 24px;
display: flex;
flex-direction: column;
gap: 12px;
}

.progress-wrap {
position: relative;
height: 4px;
background: rgba(255,255,255,.2);
border-radius: 2px;
cursor: pointer;
}
.progress-fill {
height: 100%;
background: var(--accent);
border-radius: 2px;
width: 0%;
transition: width .5s linear;
pointer-events: none;
}
.progress-thumb {
position: absolute;
top: 50%;
transform: translate(-50%, -50%);
width: 14px; height: 14px;
background: var(--accent);
border-radius: 50%;
left: 0%;
pointer-events: none;
}

.ctrl-row {
display: flex;
align-items: center;
gap: 16px;
}

.ctrl-btn {
background: rgba(255,255,255,.12);
border: none;
border-radius: 50%;
width: 48px; height: 48px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
color: #fff;
transition: background .15s, transform .1s;
flex-shrink: 0;
-webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { background: rgba(255,255,255,.25); transform: scale(.92); }
.ctrl-btn.primary {
width: 58px; height: 58px;
background: var(--accent);
color: #000;
}
.ctrl-btn.primary:active { background: #d4eb30; }

.time-display {
font-size: 12px;
color: rgba(255,255,255,.7);
font-variant-numeric: tabular-nums;
letter-spacing: .03em;
}

.ctrl-spacer { flex: 1; }

.back-btn {
position: absolute;
top: 20px;
left: 20px;
background: rgba(0,0,0,.5);
border: 1px solid rgba(255,255,255,.15);
border-radius: 8px;
padding: 8px 16px;
color: #fff;
font-family: 'DM Mono', monospace;
font-size: 12px;
cursor: pointer;
letter-spacing: .1em;
text-transform: uppercase;
-webkit-tap-highlight-color: transparent;
}
.back-btn:active { background: rgba(0,0,0,.8); }

/* Debug mode indicator — always visible above everything */
#modeIndicator {
position: absolute;
top: 20px;
right: 20px;
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 4px;
z-index: 30;
pointer-events: none;
}
.mode-badge {
font-family: 'DM Mono', monospace;
font-size: 11px;
font-weight: 500;
letter-spacing: .15em;
text-transform: uppercase;
padding: 6px 10px;
border-radius: 6px;
border: 1px solid;
background: rgba(0,0,0,.65);
}
.mode-badge.canvas { color: #e8ff47; border-color: #e8ff47; }
.mode-badge.embed  { color: #ff4757; border-color: #ff4757; }
.mode-badge.direct { color: #47b8ff; border-color: #47b8ff; }
.mode-detail {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: rgba(255,255,255,.6);
background: rgba(0,0,0,.55);
padding: 4px 8px;
border-radius: 4px;
max-width: 320px;
text-align: right;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

/* Loading state */
#loadingOverlay {
position: absolute;
inset: 0;
background: #000;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 20px;
z-index: 10;
transition: opacity .3s;
}
#loadingOverlay.gone { opacity: 0; pointer-events: none; }

.spinner {
width: 36px; height: 36px;
border: 2px solid rgba(255,255,255,.1);
border-top-color: var(--accent);
border-radius: 50%;
animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
font-size: 12px;
color: var(--muted);
letter-spacing: .15em;
text-transform: uppercase;
}

/* YouTube iframe — hidden, used for extraction */
#ytFrame {
position: fixed;
left: -9999px; top: -9999px;
width: 1px; height: 1px;
opacity: 0;
pointer-events: none;
border: none;
}

/* Method select */
.method-wrap {
width: min(560px, 90vw);
z-index: 1;
display: flex;
gap: 8px;
}
.method-btn {
flex: 1;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px 8px;
font-family: 'DM Mono', monospace;
font-size: 11px;
color: var(--muted);
cursor: pointer;
text-align: center;
transition: border-color .15s, color .15s;
-webkit-tap-highlight-color: transparent;
}
.method-btn.active {
border-color: var(--accent);
color: var(--accent);
}
</style>

</head>
<body>

<!-- ══════════════ HOME ══════════════ -->

<div class="screen" id="home">
  <div class="home-bg"></div>

  <div class="logo">Tesla<span>.</span>Theater</div>
  <div class="tagline">Canvas Player — Drive Mode</div>

  <div class="input-wrap">
    <div class="input-label">Video URL</div>
    <div class="url-row">
      <input id="urlInput" type="url"
        placeholder="https://youtube.com/watch?v=..."
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
      />
      <button class="btn-play" onclick="handlePlay()">PLAY</button>
    </div>
    <div class="hint">
      Paste any <b>YouTube</b> link, direct <b>MP4/video URL</b>, or <b>M3U8</b> stream.
      Video plays via canvas — Tesla drive mode won't block it.
    </div>
  </div>

  <div class="method-wrap">
    <div class="method-btn active" id="m-canvas" onclick="setMethod('canvas')">Canvas mode<br><small style="opacity:.6">drive bypass</small></div>
    <div class="method-btn" id="m-direct" onclick="setMethod('direct')">Direct video<br><small style="opacity:.6">parked only</small></div>
  </div>

  <div id="errorMsg"></div>

  <div class="history-wrap" id="historyWrap" style="display:none">
    <div class="history-title">Recent</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- ══════════════ PLAYER ══════════════ -->

<div class="screen hidden" id="player">

  <!-- Real video element — off-screen, Tesla can't see it -->

<video id="hiddenVideo" playsinline webkit-playsinline
preload="auto"></video>

  <!-- Canvas — what Tesla actually renders -->

<canvas id="cvs"></canvas>

  <!-- Debug mode indicator -->
  <div id="modeIndicator"></div>

  <!-- Loading -->

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading stream…</div>
  </div>

  <!-- Controls overlay -->

  <div id="controls">
    <button class="back-btn" onclick="goHome()">← Back</button>

<div class="ctrl-bar">
  <div class="progress-wrap" id="progressWrap" onclick="seekVideo(event)">
    <div class="progress-fill" id="progressFill"></div>
    <div class="progress-thumb" id="progressThumb"></div>
  </div>

  <div class="ctrl-row">
    <button class="ctrl-btn" onclick="skip(-10)" title="-10s">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        <text x="8" y="15.5" font-size="5" fill="currentColor">10</text>
      </svg>
    </button>

    <button class="ctrl-btn primary" id="playPauseBtn" onclick="togglePlay()">
      <svg id="iconPlay" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg id="iconPause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <button class="ctrl-btn" onclick="skip(10)" title="+10s">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
        <text x="8" y="15.5" font-size="5" fill="currentColor">10</text>
      </svg>
    </button>

    <div class="ctrl-spacer"></div>
    <div class="time-display" id="timeDisplay">0:00 / 0:00</div>

    <button class="ctrl-btn" onclick="toggleMute()" id="muteBtn" title="Mute">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
    </button>

    <button class="ctrl-btn" onclick="toggleFullscreen()" title="Fullscreen">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>
    </button>
  </div>
</div>

  </div>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let method = 'canvas';
let rafId = null;
let controlsTimer = null;
let isPlaying = false;

const video  = document.getElementById('hiddenVideo');
const cvs    = document.getElementById('cvs');
const ctx    = cvs.getContext('2d');

// ═══════════════════════════════════════
// METHOD SELECT
// ═══════════════════════════════════════
function setMethod(m) {
  method = m;
  document.getElementById('m-canvas').classList.toggle('active', m === 'canvas');
  document.getElementById('m-direct').classList.toggle('active', m === 'direct');
}

// ═══════════════════════════════════════
// MODE INDICATOR (debug overlay)
// ═══════════════════════════════════════
// kind: 'canvas' | 'embed' | 'direct' | null  detail: short string or ''
function setMode(kind, detail) {
  const ind = document.getElementById('modeIndicator');
  if (!kind) { ind.innerHTML = ''; return; }
  const label = {
    canvas: 'CANVAS · drive bypass',
    embed:  'YT EMBED · drive blocks',
    direct: 'DIRECT · parked only',
  }[kind] || kind.toUpperCase();
  ind.innerHTML =
    `<div class="mode-badge ${kind}">${label}</div>` +
    (detail ? `<div class="mode-detail">${detail}</div>` : '');
}

// ═══════════════════════════════════════
// URL PARSING
// ═══════════════════════════════════════
function extractVideoId(url) {
  const patterns = [
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /embed\/([a-zA-Z0-9_-]{11})/,
    /shorts\/([a-zA-Z0-9_-]{11})/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function isDirectVideo(url) {
  return /\.(mp4|webm|ogg|mov|m3u8)(\?|$)/i.test(url);
}

// ═══════════════════════════════════════
// PLAY HANDLER
// ═══════════════════════════════════════
function handlePlay() {
  const raw = document.getElementById('urlInput').value.trim();
  setError('');

  if (!raw) { setError('Paste a URL first'); return; }

  const ytId = extractVideoId(raw);
  const direct = isDirectVideo(raw);
  ttlog('handlePlay', { raw, ytId, direct, method });

  if (ytId) {
    loadYouTube(ytId, raw);
  } else if (direct) {
    loadDirect(raw);
  } else {
    // Try as direct anyway
    loadDirect(raw);
  }
}

// ─── YouTube via Cobalt / Piped / Invidious (canvas mode) or embed (direct mode) ───

// 🔧 Self-hosted backend (recommended). Public Piped/Invidious instances are
// mostly dead in 2026. Deploy worker.js (in this repo) on Cloudflare Workers
// — it's ~50 lines, free tier, instant — and paste the URL below.
// Expected to accept ?id=VIDEOID and return {kind:'mp4'|'hls', url:'...'}.
const CUSTOM_BACKEND = null; // e.g. 'https://yt-proxy.youraccount.workers.dev/'

// Community Cobalt instances (POST /api/json). They actually mux streams
// through a real yt-dlp pipeline server-side, so they hold up much better
// than Piped/Invidious.
const COBALT_HOSTS = [
  'co.eepy.today',
  'capi.oct.world',
  'cobalt.synzr.ru',
  'api.cobalt.tools',
];

const PIPED_HOSTS = [
  'pipedapi.kavin.rocks',
  'pipedapi.adminforge.de',
  'api.piped.privacydev.net',
  'api.piped.yt',
  'pipedapi-libre.kavin.rocks',
];
const INVIDIOUS_HOSTS = [
  'inv.nadeko.net',
  'invidious.privacyredirect.com',
  'invidious.nerdvpn.de',
  'y.com.sb',
  'yewtu.be',
  'invidious.f5.si',
];

// ─── Console logger (prefixed + JSON-serialised for copy-paste) ───
const TT_T0 = Date.now();
function ttfmt(args) {
  return args.map(a => {
    if (a == null || typeof a !== 'object') return String(a);
    try { return JSON.stringify(a); } catch(e) { return String(a); }
  }).join(' ');
}
function ttlog(...args) {
  const t = ((Date.now() - TT_T0) / 1000).toFixed(2).padStart(6, ' ');
  console.log(`[TT +${t}s] ${ttfmt(args)}`);
}
function ttwarn(...args) {
  const t = ((Date.now() - TT_T0) / 1000).toFixed(2).padStart(6, ' ');
  console.warn(`[TT +${t}s] ${ttfmt(args)}`);
}
// Surface uncaught errors and unhandled promise rejections too
window.addEventListener('error', e => ttwarn('window.error', {
  message: e.message, src: e.filename, line: e.lineno,
}));
window.addEventListener('unhandledrejection', e => ttwarn('unhandledrejection', {
  reason: String(e.reason),
}));

// Public CORS proxies — used to wrap JSON API calls to Piped/Invidious
// when their CORS headers reject our origin.
const CORS_PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

// Read body once and try to parse as JSON. If body is HTML / shutdown
// notice / empty, return null instead of throwing.
async function readJsonOrNull(res, label, url) {
  let txt;
  try { txt = await res.text(); }
  catch (e) {
    ttwarn(`${label} body read failed`, { url, name: e.name, msg: e.message });
    return null;
  }
  const t = txt.trim();
  if (!t) { ttwarn(`${label} empty body`, { url }); return null; }
  if (t[0] !== '{' && t[0] !== '[') {
    ttwarn(`${label} non-JSON body`, { url, head: t.slice(0, 60) });
    return null;
  }
  try { return JSON.parse(t); }
  catch (e) {
    ttwarn(`${label} JSON parse fail`, { url, msg: e.message });
    return null;
  }
}

async function fetchJsonAny(targetUrl, ms = 3000) {
  // 1) direct
  try {
    const t0 = Date.now();
    const res = await fetchWithTimeout(targetUrl, ms);
    const dt = Date.now() - t0;
    if (res.ok) {
      const data = await readJsonOrNull(res, 'fetchJson[direct]', targetUrl);
      if (data) { ttlog(`fetchJson[direct] ok ${dt}ms`, { url: targetUrl }); return data; }
    } else {
      ttwarn(`fetchJson[direct] HTTP ${res.status} ${dt}ms`, { url: targetUrl });
    }
  } catch (e) {
    ttwarn(`fetchJson[direct] threw`, { url: targetUrl, name: e.name, msg: e.message });
  }
  // 2) via cors proxies
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    const proxied = CORS_PROXIES[i](targetUrl);
    try {
      const t0 = Date.now();
      const res = await fetchWithTimeout(proxied, ms);
      const dt = Date.now() - t0;
      if (res.ok) {
        const data = await readJsonOrNull(res, `fetchJson[proxy${i}]`, targetUrl);
        if (data) {
          ttlog(`fetchJson[proxy${i}] ok ${dt}ms`, { url: targetUrl, via: tryHost(proxied) });
          return data;
        }
      } else {
        ttwarn(`fetchJson[proxy${i}] HTTP ${res.status} ${dt}ms`, { url: targetUrl });
      }
    } catch (e) {
      ttwarn(`fetchJson[proxy${i}] threw`, { url: targetUrl, name: e.name, msg: e.message });
    }
  }
  return null;
}

async function loadYouTube(videoId, originalUrl) {
  showPlayer();
  setLoading(true);
  setMode('canvas', 'Resolving stream…');
  ttlog('loadYouTube', { videoId, originalUrl, method,
    origin: location.origin, ua: navigator.userAgent, online: navigator.onLine });

  // Direct mode: skip canvas pipeline — embed works when parked
  if (method === 'direct') {
    ttlog('direct method → embed iframe');
    loadYouTubeEmbed(videoId, originalUrl);
    return;
  }

  // Strategy 0: self-hosted backend (worker.js on Cloudflare). Fastest,
  // most reliable path — runs server-side so no CORS issues.
  if (CUSTOM_BACKEND) {
    setMode('canvas', `backend → ${tryHost(CUSTOM_BACKEND)}`);
    const url = CUSTOM_BACKEND.replace(/\/$/, '') + `?id=${encodeURIComponent(videoId)}`;
    const data = await fetchJsonAny(url, 8000);
    if (data && data.url) {
      ttlog(`backend response`, { kind: data.kind, urlHost: tryHost(data.url),
        title: data.title, itag: data.itag });
      if (await tryLoadVideo(data.url)) {
        addHistory(originalUrl);
        setLoading(false);
        setMode('canvas', `backend · ${data.kind || 'mp4'}`);
        ttlog(`SUCCESS via custom backend`);
        startCanvas();
        safePlay();
        return;
      }
      ttwarn(`backend stream rejected by <video>`);
    }
  }

  // Strategy 1: Cobalt community instances (POST /api/json). They mux
  // a fresh URL server-side with a real yt-dlp pipeline, much more
  // resilient than Piped/Invidious.
  ttlog('strategy 1: cobalt', { hosts: COBALT_HOSTS });
  for (const host of COBALT_HOSTS) {
    setMode('canvas', `cobalt → ${host}`);
    const t0 = Date.now();
    try {
      const res = await fetchWithTimeout(`https://${host}/api/json`, 8000, {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url: `https://www.youtube.com/watch?v=${videoId}`,
          vQuality: '720', videoQuality: '720',
          isAudioOnly: false, audioFormat: 'mp3', filenamePattern: 'basic',
        }),
      });
      const ms = Date.now() - t0;
      if (!res.ok) {
        ttwarn(`cobalt[${host}] HTTP ${res.status} ${ms}ms`);
        continue;
      }
      const data = await res.json();
      ttlog(`cobalt[${host}] ${ms}ms`, {
        status: data.status, kind: data.kind, urlHost: tryHost(data.url),
        text: data.text,
      });
      if (data.status !== 'stream' && data.status !== 'redirect' && data.status !== 'tunnel') continue;
      if (!data.url) continue;
      if (await tryLoadVideo(data.url)) {
        addHistory(originalUrl);
        setLoading(false);
        setMode('canvas', `cobalt · ${host}`);
        ttlog(`SUCCESS via cobalt[${host}]`);
        startCanvas();
        safePlay();
        return;
      }
      ttwarn(`cobalt[${host}] stream rejected by <video>`);
    } catch (e) {
      ttwarn(`cobalt[${host}] threw`, { name: e.name, msg: e.message,
        ms: Date.now() - t0 });
    }
  }

  // Strategy 2: Piped JSON API (direct or via CORS proxy)
  ttlog('strategy 2: piped API', { hosts: PIPED_HOSTS });
  for (const host of PIPED_HOSTS) {
    setMode('canvas', `piped → ${host}`);
    const data = await fetchJsonAny(`https://${host}/streams/${videoId}`, 5000);
    if (!data) continue;
    const allStreams = data.videoStreams || [];
    const combined = allStreams.filter(s =>
      s.videoOnly === false && s.mimeType && s.mimeType.includes('mp4')
    );
    ttlog(`piped[${host}] parsed`, {
      videoStreams: allStreams.length,
      combinedMp4: combined.length,
      qualities: combined.map(s => s.quality),
      title: data.title,
    });
    if (!combined.length) continue;
    const stream =
      combined.find(s => s.quality === '720p') ||
      combined.find(s => s.quality === '360p') ||
      combined[0];
    ttlog(`piped[${host}] picked stream`, {
      quality: stream.quality, mime: stream.mimeType, urlHost: tryHost(stream.url),
    });
    if (await tryLoadVideo(stream.url)) {
      addHistory(originalUrl);
      setLoading(false);
      setMode('canvas', `piped · ${host} · ${stream.quality}`);
      ttlog(`SUCCESS via piped[${host}] ${stream.quality}`);
      startCanvas();
      safePlay();
      return;
    }
    ttwarn(`piped[${host}] stream rejected by <video>`, { quality: stream.quality });
  }

  // Strategy 3: Invidious JSON API → formatStreams (combined audio+video)
  ttlog('strategy 3: invidious /api/v1/videos', { hosts: INVIDIOUS_HOSTS });
  for (const host of INVIDIOUS_HOSTS) {
    setMode('canvas', `inv-api → ${host}`);
    const data = await fetchJsonAny(`https://${host}/api/v1/videos/${videoId}?fields=title,formatStreams`, 5000);
    if (!data) continue;
    const fs = (data.formatStreams || []).filter(s =>
      s.container === 'mp4' || (s.type && s.type.includes('mp4'))
    );
    ttlog(`inv-api[${host}] parsed`, {
      formatStreams: (data.formatStreams || []).length,
      mp4: fs.length, qualities: fs.map(s => s.qualityLabel || s.quality),
      title: data.title,
    });
    if (!fs.length) continue;
    const stream = fs.find(s => /720p?/.test(s.qualityLabel || ''))
                || fs.find(s => /360p?/.test(s.qualityLabel || ''))
                || fs[0];
    ttlog(`inv-api[${host}] picked`, {
      q: stream.qualityLabel || stream.quality, urlHost: tryHost(stream.url),
    });
    if (await tryLoadVideo(stream.url)) {
      addHistory(originalUrl);
      setLoading(false);
      setMode('canvas', `inv-api · ${host} · ${stream.qualityLabel || stream.quality}`);
      ttlog(`SUCCESS via inv-api[${host}]`);
      startCanvas();
      safePlay();
      return;
    }
    ttwarn(`inv-api[${host}] stream rejected by <video>`);
  }

  // Strategy 3: Invidious latest_version (server-side redirect)
  ttlog('strategy 4: invidious latest_version', { hosts: INVIDIOUS_HOSTS });
  for (const host of INVIDIOUS_HOSTS) {
    for (const itag of [22, 18]) {
      setMode('canvas', `inv-redir → ${host} itag${itag}`);
      const url = `https://${host}/latest_version?id=${videoId}&itag=${itag}&local=true`;
      const t0 = Date.now();
      const ok = await tryLoadVideo(url);
      const ms = Date.now() - t0;
      if (ok) {
        addHistory(originalUrl);
        setLoading(false);
        setMode('canvas', `invidious · ${host} · itag ${itag}`);
        ttlog(`SUCCESS via invidious[${host}] itag${itag} in ${ms}ms`);
        startCanvas();
        safePlay();
        return;
      }
      ttwarn(`invidious[${host}] itag${itag} failed in ${ms}ms`);
    }
  }

  ttwarn('ALL canvas strategies exhausted → falling back to YT embed iframe');
  loadYouTubeEmbed(videoId, originalUrl);
}

function tryHost(url) { try { return new URL(url).hostname; } catch(e) { return '?'; } }

function fetchWithTimeout(url, ms, opts = {}) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal, mode: 'cors', ...opts })
    .finally(() => clearTimeout(t));
}

function tryLoadVideo(url) {
  return new Promise((resolve) => {
    let done = false;
    const t0 = Date.now();
    const tag = (() => { try { return new URL(url).hostname; } catch(e) { return '?'; } })();
    const finish = (ok, why) => {
      if (done) return;
      done = true;
      clearTimeout(timeout);
      video.removeEventListener('loadedmetadata', onMeta);
      video.removeEventListener('canplay', onOk);
      video.removeEventListener('error', onErr);
      ttlog(`tryLoadVideo[${tag}] → ${ok ? 'OK' : 'FAIL'}`, {
        reason: why, ms: Date.now() - t0,
        videoW: video.videoWidth, videoH: video.videoHeight,
        readyState: video.readyState, networkState: video.networkState,
        errCode: video.error?.code,
      });
      resolve(ok);
    };
    const onMeta = () => {
      if (!video.videoWidth || !video.videoHeight) finish(false, 'no-video-track');
    };
    const onOk  = () => {
      if (video.videoWidth && video.videoHeight) finish(true, 'canplay+hasVideo');
    };
    const onErr = () => finish(false, 'video.error');
    const timeout = setTimeout(() => finish(false, 'timeout4s'), 4000);

    video.addEventListener('loadedmetadata', onMeta);
    video.addEventListener('canplay', onOk);
    video.addEventListener('error', onErr);
    video.src = url;
    video.load();
  });
}

// ─── YouTube embed fallback ───
function loadYouTubeEmbed(videoId, originalUrl) {
  // Stop any leftover audio from failed Invidious attempts
  video.pause();
  video.removeAttribute('src');
  video.load();
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  setLoading(false);

  const playerEl = document.getElementById('player');
  const existingFrame = document.getElementById('ytEmbedFrame');
  if (existingFrame) existingFrame.remove();

  const iframe = document.createElement('iframe');
  iframe.id = 'ytEmbedFrame';
  iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&playsinline=1&rel=0&modestbranding=1`;
  iframe.allow = 'autoplay; fullscreen; encrypted-media';
  iframe.allowFullscreen = true;
  iframe.style.cssText = `
    position:absolute; inset:0; width:100%; height:100%;
    border:none; z-index:20; background:#000;
  `;
  playerEl.appendChild(iframe);

  document.getElementById('controls').style.display = 'none';
  setMode('embed', `YT iframe · id ${videoId}`);
  ttwarn('YT embed iframe inserted (Drive Mode will block it)', { videoId });
  addHistory(originalUrl);
  setError('');
}

// ─── Direct MP4/M3U8 ───
function loadDirect(url) {
  showPlayer();
  setLoading(true);
  ttlog('loadDirect', { url, method });

  const t0 = Date.now();
  const onCanPlay = () => {
    video.removeEventListener('canplay', onCanPlay);
    video.removeEventListener('error', onErr);
    setLoading(false);
    const kind = method === 'canvas' ? 'canvas' : 'direct';
    let host = url; try { host = new URL(url).hostname; } catch(e) {}
    setMode(kind, host);
    ttlog(`loadDirect canplay ${Date.now()-t0}ms`, {
      videoW: video.videoWidth, videoH: video.videoHeight,
      duration: video.duration, kind,
    });
    if (method === 'canvas') startCanvas();
    safePlay();
  };
  const onErr = () => {
    video.removeEventListener('canplay', onCanPlay);
    video.removeEventListener('error', onErr);
    setLoading(false);
    ttwarn(`loadDirect error ${Date.now()-t0}ms`, {
      errCode: video.error?.code, errMsg: video.error?.message,
      networkState: video.networkState,
    });
    setError('Could not load video. Check URL or CORS.');
    goHome();
  };

  video.addEventListener('canplay', onCanPlay);
  video.addEventListener('error', onErr);
  video.src = url;
  video.load();

  addHistory(url);
}

// Try to play; if autoplay policy blocks, retry muted.
function safePlay() {
  video.play().then(() => {
    ttlog('safePlay: playing (unmuted)');
    updatePlayState(true);
  }).catch(err1 => {
    ttwarn('safePlay: unmuted play rejected', { name: err1.name, message: err1.message });
    if (!video.muted) {
      video.muted = true;
      muted = true;
      video.play().then(() => {
        ttlog('safePlay: playing (muted fallback)');
        updatePlayState(true);
      }).catch(err2 => {
        ttwarn('safePlay: muted play also rejected', { name: err2.name, message: err2.message });
        setError('Tap play to start');
      });
    } else {
      setError('Tap play to start');
    }
  });
}

// ═══════════════════════════════════════
// CANVAS RENDER LOOP
// ═══════════════════════════════════════
function startCanvas() {
  if (rafId) cancelAnimationFrame(rafId);

  function resize() {
    cvs.width  = window.innerWidth  * devicePixelRatio;
    cvs.height = window.innerHeight * devicePixelRatio;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (vw && vh && video.readyState >= 2) {
      const cw = cvs.width, ch = cvs.height;
      const scale = Math.min(cw / vw, ch / vh);
      const dw = vw * scale, dh = vh * scale;
      const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cw, ch);
      ctx.drawImage(video, dx, dy, dw, dh);

      if (!video.paused && !video.ended) updateProgress();
    }
    rafId = requestAnimationFrame(draw);
  }
  draw();
}

// ═══════════════════════════════════════
// VIDEO CONTROLS
// ═══════════════════════════════════════
function togglePlay() {
  if (video.paused) {
    video.play().then(() => updatePlayState(true));
  } else {
    video.pause();
    updatePlayState(false);
  }
}

function updatePlayState(playing) {
  isPlaying = playing;
  document.getElementById('iconPlay').style.display  = playing ? 'none' : 'block';
  document.getElementById('iconPause').style.display = playing ? 'block' : 'none';
}

function skip(sec) {
  video.currentTime = Math.max(0, Math.min(video.duration || 0, video.currentTime + sec));
  showControls();
}

let muted = false;
function toggleMute() {
  muted = !muted;
  video.muted = muted;
}

function seekVideo(e) {
  const rect = document.getElementById('progressWrap').getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  video.currentTime = ratio * (video.duration || 0);
}

function updateProgress() {
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressThumb').style.left  = pct + '%';
  document.getElementById('timeDisplay').textContent =
    fmtTime(video.currentTime) + ' / ' + fmtTime(video.duration);
}

function fmtTime(s) {
  if (!isFinite(s)) return '—';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

// ═══════════════════════════════════════
// CONTROLS VISIBILITY
// ═══════════════════════════════════════
function showControls() {
  const ctrl = document.getElementById('controls');
  ctrl.classList.remove('fade');
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => ctrl.classList.add('fade'), 3000);
}

document.getElementById('cvs').addEventListener('click', showControls);
document.getElementById('cvs').addEventListener('touchstart', showControls, { passive: true });

// Video events
video.addEventListener('play',  () => updatePlayState(true));
video.addEventListener('pause', () => updatePlayState(false));
video.addEventListener('ended', () => updatePlayState(false));

// ═══════════════════════════════════════
// SCREEN NAV
// ═══════════════════════════════════════
function showPlayer() {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('player').classList.remove('hidden');
  document.getElementById('controls').style.display = '';
  setError('');
  showControls();
}

function goHome() {
  document.getElementById('player').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');

  video.pause();
  video.src = '';
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  // Remove embed iframe if any
  const f = document.getElementById('ytEmbedFrame');
  if (f) f.remove();
  document.getElementById('controls').style.display = '';
  setMode(null);
}

// ═══════════════════════════════════════
// LOADING / ERROR
// ═══════════════════════════════════════
function setLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('gone', !on);
}
function setError(msg) {
  document.getElementById('errorMsg').textContent = msg;
}

// ═══════════════════════════════════════
// HISTORY (sessionStorage — Tesla per-session)
// ═══════════════════════════════════════
function addHistory(url) {
  try {
    let h = JSON.parse(sessionStorage.getItem('th') || '[]');
    h = [url, ...h.filter(u => u !== url)].slice(0, 5);
    sessionStorage.setItem('th', JSON.stringify(h));
    renderHistory();
  } catch(e) {}
}

function renderHistory() {
  try {
    const h = JSON.parse(sessionStorage.getItem('th') || '[]');
    const wrap = document.getElementById('historyWrap');
    const list = document.getElementById('historyList');
    if (!h.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    list.innerHTML = h.map(url =>
      `<div class="history-item" onclick="loadFromHistory('${url.replace(/'/g,"\\'")}')">▶ ${url}</div>`
    ).join('');
  } catch(e) {}
}

function loadFromHistory(url) {
  document.getElementById('urlInput').value = url;
  handlePlay();
}

renderHistory();

// ═══════════════════════════════════════
// KEYBOARD (desktop testing)
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('home').classList.contains('hidden') === false) {
    handlePlay();
  }
  if (e.key === ' ' && !document.getElementById('player').classList.contains('hidden')) {
    e.preventDefault(); togglePlay();
  }
  if (e.key === 'ArrowRight') skip(10);
  if (e.key === 'ArrowLeft')  skip(-10);
});

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handlePlay();
});
</script>
